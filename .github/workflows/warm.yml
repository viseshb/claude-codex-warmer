name: warm-usage-windows

# Warms the rolling 5-hour usage windows for Claude Code (Pro/Max subscription)
# and Codex (ChatGPT subscription) by sending one throwaway prompt each morning.
# The 5h window starts on the FIRST message, so firing early = window ready at work start.
#
# Auth: subscription OAuth tokens only, NO API keys.
#   - Claude: CLAUDE_CODE_OAUTH_TOKEN  (from `claude setup-token`)
#   - Codex:  CODEX_AUTH_JSON          (contents of ~/.codex/auth.json after `codex login`)
#
# Schedule notes:
#   - GitHub cron is UTC only, no DST, and is best-effort: scheduled runs on a
#     low-traffic repo have been observed running 60-90+ min late, not the
#     "5-15 min" GitHub's own docs suggest. A single fixed-hour trigger is not
#     reliable enough to hit a target wake-up time.
#   - Fix: fire every 15 min across a wide early-morning UTC window, but each
#     job checks a committed per-provider state file first and only sends for
#     real once per calendar day (target timezone). Every other run that day
#     is a ~5s no-op (checkout + date check, nothing installed). This
#     guarantees exactly one real Claude call + one real Codex call per day,
#     as early as GitHub actually gets around to running the workflow,
#     regardless of how many times the cron fires or how late it runs.
#   - Manual `workflow_dispatch` always sends for real (bypasses the dedupe
#     check) and updates the state file, so a manual test that morning
#     correctly replaces that day's automatic send.
#   - Scheduled workflows run ONLY on the default branch.

on:
  schedule:
    - cron: "*/15 9-13 * * *"   # every 15 min, 09:00-13:45 UTC = ~03:00-08:45 CDT/CST
  workflow_dispatch:              # manual "Run workflow" button - always sends for real

# Least privilege by default; jobs that commit state elevate to write.
permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # Claude Code — uses your Pro/Max subscription via OAuth token. Solid path.
  # --------------------------------------------------------------------------
  warm-claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Check if already warmed today
        id: check
        run: |
          today=$(TZ="America/Chicago" date +%F)
          last=$(cat .state/claude-last-warm.txt 2>/dev/null || echo "")
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$last" = "$today" ]; then
            echo "Already warmed Claude today ($today) - skipping duplicate run."
            echo "send=false" >> "$GITHUB_OUTPUT"
          else
            echo "send=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.check.outputs.send == 'true'
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        if: steps.check.outputs.send == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Send warm-up prompt
        if: steps.check.outputs.send == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude -p "hi" \
            --model claude-haiku-4-5-20251001

      - name: Record today as warmed
        if: steps.check.outputs.send == 'true'
        run: |
          mkdir -p .state
          TZ="America/Chicago" date +%F > .state/claude-last-warm.txt
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .state/claude-last-warm.txt
          git commit -m "chore: mark claude warmed $(cat .state/claude-last-warm.txt)" || exit 0
          for i in 1 2 3; do
            git pull --rebase --autostash && git push && break
            sleep $((RANDOM % 5 + 1))
          done

  # --------------------------------------------------------------------------
  # Codex — uses your ChatGPT subscription via restored auth.json.
  # FRAGILE: refresh tokens can rotate/expire. We write the refreshed
  # auth.json back to the secret after the run so cron keeps working.
  # This write-back needs a PAT (secret GH_PAT) with 'secrets: write'.
  # Without GH_PAT the run still works, but you may need to re-login and
  # update CODEX_AUTH_JSON manually every few days.
  # --------------------------------------------------------------------------
  warm-codex:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_PAT: ${{ secrets.GH_PAT }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if already warmed today
        id: check
        run: |
          today=$(TZ="America/Chicago" date +%F)
          last=$(cat .state/codex-last-warm.txt 2>/dev/null || echo "")
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$last" = "$today" ]; then
            echo "Already warmed Codex today ($today) - skipping duplicate run."
            echo "send=false" >> "$GITHUB_OUTPUT"
          else
            echo "send=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.check.outputs.send == 'true'
        with:
          node-version: "20"

      - name: Install Codex CLI
        if: steps.check.outputs.send == 'true'
        run: npm install -g @openai/codex

      - name: Restore Codex auth
        if: steps.check.outputs.send == 'true'
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          mkdir -p "$HOME/.codex"
          printf '%s' "$CODEX_AUTH_JSON" > "$HOME/.codex/auth.json"
          chmod 600 "$HOME/.codex/auth.json"

      - name: Send warm-up prompt
        if: steps.check.outputs.send == 'true'
        run: |
          codex exec \
            --skip-git-repo-check \
            -m gpt-5.4-mini \
            -c model_reasoning_effort="low" \
            "hi"

      - name: Persist refreshed auth back to secret (best-effort)
        if: ${{ steps.check.outputs.send == 'true' && env.GH_PAT != '' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ env.GH_PAT }}
        run: |
          # Codex may have rotated the refresh token during the run.
          # Push the updated auth.json back so the next cron run authenticates.
          gh secret set CODEX_AUTH_JSON \
            --repo "${{ github.repository }}" \
            --body "$(cat "$HOME/.codex/auth.json")"

      - name: Record today as warmed
        if: steps.check.outputs.send == 'true'
        run: |
          mkdir -p .state
          TZ="America/Chicago" date +%F > .state/codex-last-warm.txt
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .state/codex-last-warm.txt
          git commit -m "chore: mark codex warmed $(cat .state/codex-last-warm.txt)" || exit 0
          for i in 1 2 3; do
            git pull --rebase --autostash && git push && break
            sleep $((RANDOM % 5 + 1))
          done

  # --------------------------------------------------------------------------
  # Heartbeat — one commit per run keeps the repo "active" so GitHub never
  # auto-disables the schedule after 60 idle days. Runs even if warms fail.
  # --------------------------------------------------------------------------
  heartbeat:
    needs: [warm-claude, warm-codex]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Commit timestamp
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > heartbeat.txt
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add heartbeat.txt
          git commit -m "chore: heartbeat $(cat heartbeat.txt)" || exit 0
          for i in 1 2 3; do
            git pull --rebase --autostash && git push && break
            sleep $((RANDOM % 5 + 1))
          done
