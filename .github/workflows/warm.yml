name: warm-usage-windows

# Keeps the rolling 5-hour usage windows for Claude Code (Pro/Max subscription)
# and Codex (ChatGPT subscription) CONTINUOUSLY warm by re-sending one throwaway
# prompt every ~5 hours, around the clock.
#
# Why continuous, not once-a-day: the 5h window starts on the first message and
# EXPIRES 5h later. A single morning warm-up is useless if you sit down more
# than 5h after it fired — the window is already dead and your first real
# message starts a fresh one anyway (this happened; see commit history).
# Chaining a tiny "hi" right after each window expires means a window is
# already active whenever you actually start working, at a cost of ~5 trivial
# messages per provider per day.
#
# Auth: subscription OAuth tokens only, NO API keys.
#   - Claude: CLAUDE_CODE_OAUTH_TOKEN  (from `claude setup-token`)
#   - Codex:  CODEX_AUTH_JSON          (contents of ~/.codex/auth.json after `codex login`)
#
# Scheduling mechanics:
#   - Cron fires every 30 min all day. Each job reads a committed per-provider
#     epoch-seconds state file and only sends for real once the last warm is
#     more than 5h01m old — i.e. strictly AFTER the previous window expired.
#     (Sending BEFORE expiry would be worse than useless: the message lands
#     inside the still-active window and does NOT start a new one, so the
#     chain would silently break.) Every other trigger is a ~5s no-op.
#   - GitHub cron is best-effort and often late on low-traffic repos; with an
#     elapsed-time gate that's harmless — the first run that lands after
#     expiry re-warms, and the chain self-corrects.
#   - Manual `workflow_dispatch` always sends for real (bypasses the gate)
#     and updates the state file.
#   - Scheduled workflows run ONLY on the default branch.
#
# Resilience:
#   - CLI versions are pinned (see env below) so an upstream release can't
#     silently break a flag this workflow depends on. Bump deliberately.
#   - The warm-up call itself retries up to 3x with a short backoff, so a
#     transient network/API blip doesn't count as a real failure or wake
#     anyone up for nothing.
#   - If a job still fails after retries (e.g. a subscription token was
#     genuinely revoked), the `notify` job opens a single GitHub issue with
#     the exact recovery commands. GitHub emails repo owners on new issues
#     by default, so you find out without watching the Actions tab. Once a
#     later run succeeds again, that issue is auto-closed.

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min, 24/7 — the elapsed-time gate limits real sends to ~5/day
  workflow_dispatch:           # manual "Run workflow" button - always sends for real

# Least privilege by default; jobs that need more elevate individually.
permissions:
  contents: read

env:
  # Minimum seconds between real warms: 5h + 1min safety margin, so a send can
  # never land inside the previous still-active window (which would be wasted
  # and would NOT start a new window).
  WARM_INTERVAL_SECONDS: "18060"
  # Pinned CLI versions - last verified working. Bump intentionally, not
  # silently via an unpinned `npm install -g <pkg>@latest`.
  CLAUDE_CLI_VERSION: "2.1.205"
  CODEX_CLI_VERSION: "0.143.0"

jobs:
  # --------------------------------------------------------------------------
  # Claude Code — uses your Pro/Max subscription via OAuth token. Solid path.
  # --------------------------------------------------------------------------
  warm-claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Check if previous window still active
        id: check
        run: |
          now=$(date +%s)
          last=$(cat .state/claude-last-warm.txt 2>/dev/null || echo 0)
          # Legacy state files stored a YYYY-MM-DD date; treat anything
          # non-numeric as "never warmed".
          case "$last" in (''|*[!0-9]*) last=0 ;; esac
          elapsed=$(( now - last ))
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$elapsed" -lt "$WARM_INTERVAL_SECONDS" ]; then
            echo "Claude window still active (warmed ${elapsed}s ago, < ${WARM_INTERVAL_SECONDS}s) - skipping."
            echo "send=false" >> "$GITHUB_OUTPUT"
          else
            echo "send=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.check.outputs.send == 'true'
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        if: steps.check.outputs.send == 'true'
        run: npm install -g "@anthropic-ai/claude-code@${CLAUDE_CLI_VERSION}"

      - name: Send warm-up prompt
        if: steps.check.outputs.send == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          for i in 1 2 3; do
            claude -p "hi" --model claude-haiku-4-5-20251001 && exit 0
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "All 3 attempts failed."
          exit 1

      - name: Record warm timestamp
        if: steps.check.outputs.send == 'true'
        run: |
          mkdir -p .state
          date +%s > .state/claude-last-warm.txt
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .state/claude-last-warm.txt
          git commit -m "chore: warm claude $(TZ='America/Chicago' date '+%F %H:%M %Z')" || exit 0
          for i in 1 2 3; do
            git pull --rebase --autostash && git push && break
            sleep $((RANDOM % 5 + 1))
          done

  # --------------------------------------------------------------------------
  # Codex — uses your ChatGPT subscription via restored auth.json.
  # FRAGILE: refresh tokens can rotate/expire. We write the refreshed
  # auth.json back to the secret after the run so cron keeps working.
  # This write-back needs a PAT (secret GH_PAT) with 'secrets: write'.
  # Without GH_PAT the run still works, but you may need to re-login and
  # update CODEX_AUTH_JSON manually every so often.
  # --------------------------------------------------------------------------
  warm-codex:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_PAT: ${{ secrets.GH_PAT }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if previous window still active
        id: check
        run: |
          now=$(date +%s)
          last=$(cat .state/codex-last-warm.txt 2>/dev/null || echo 0)
          case "$last" in (''|*[!0-9]*) last=0 ;; esac
          elapsed=$(( now - last ))
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$elapsed" -lt "$WARM_INTERVAL_SECONDS" ]; then
            echo "Codex window still active (warmed ${elapsed}s ago, < ${WARM_INTERVAL_SECONDS}s) - skipping."
            echo "send=false" >> "$GITHUB_OUTPUT"
          else
            echo "send=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.check.outputs.send == 'true'
        with:
          node-version: "20"

      - name: Install Codex CLI
        if: steps.check.outputs.send == 'true'
        run: npm install -g "@openai/codex@${CODEX_CLI_VERSION}"

      - name: Restore Codex auth
        if: steps.check.outputs.send == 'true'
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          mkdir -p "$HOME/.codex"
          printf '%s' "$CODEX_AUTH_JSON" > "$HOME/.codex/auth.json"
          chmod 600 "$HOME/.codex/auth.json"

      - name: Send warm-up prompt
        if: steps.check.outputs.send == 'true'
        run: |
          for i in 1 2 3; do
            codex exec --skip-git-repo-check -m gpt-5.4-mini \
              -c model_reasoning_effort="low" "hi" && exit 0
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "All 3 attempts failed."
          exit 1

      - name: Persist refreshed auth back to secret (best-effort)
        if: ${{ steps.check.outputs.send == 'true' && env.GH_PAT != '' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ env.GH_PAT }}
        run: |
          # Codex may have rotated the refresh token during the run.
          # Push the updated auth.json back so the next cron run authenticates.
          gh secret set CODEX_AUTH_JSON \
            --repo "${{ github.repository }}" \
            --body "$(cat "$HOME/.codex/auth.json")"

      - name: Record warm timestamp
        if: steps.check.outputs.send == 'true'
        run: |
          mkdir -p .state
          date +%s > .state/codex-last-warm.txt
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .state/codex-last-warm.txt
          git commit -m "chore: warm codex $(TZ='America/Chicago' date '+%F %H:%M %Z')" || exit 0
          for i in 1 2 3; do
            git pull --rebase --autostash && git push && break
            sleep $((RANDOM % 5 + 1))
          done

  # --------------------------------------------------------------------------
  # Notify — the only time you should ever need to look at this repo. If a
  # warm job fails (all 3 retries exhausted - a real auth/CLI problem, not a
  # blip), open one GitHub issue with the exact fix. GitHub emails repo
  # owners on new issues/comments by default, so this reaches you without
  # anyone polling Actions. Once things succeed again, auto-close it.
  # --------------------------------------------------------------------------
  notify:
    needs: [warm-claude, warm-codex]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      CLAUDE_FAILED: ${{ needs.warm-claude.result == 'failure' }}
      CODEX_FAILED: ${{ needs.warm-codex.result == 'failure' }}
    steps:
      - name: Open or update failure issue
        if: env.CLAUDE_FAILED == 'true' || env.CODEX_FAILED == 'true'
        run: |
          title="Warm-up needs attention"
          existing=$(gh issue list --repo "$REPO" --state open --json number,title \
            --jq '[.[] | select(.title=="'"$title"'")][0].number // empty')

          body="Automated warm-up failed after 3 retries. Failed run: $RUN_URL"$'\n\n'

          if [ "$CLAUDE_FAILED" = "true" ]; then
            body+="### Claude"$'\n'
            body+='Likely an expired/revoked OAuth token. Fix (run in your own terminal):'$'\n'
            body+='```bash'$'\n'
            body+='claude setup-token'$'\n'
            body+="gh secret set CLAUDE_CODE_OAUTH_TOKEN --repo $REPO"$'\n'
            body+='```'$'\n\n'
          fi

          if [ "$CODEX_FAILED" = "true" ]; then
            body+="### Codex"$'\n'
            body+='Likely a revoked refresh token (OpenAI has no long-lived CI credential). Fix (run in your own terminal, or use the Codex desktop app to sign in, then run the second command):'$'\n'
            body+='```bash'$'\n'
            body+='codex login'$'\n'
            body+="gh secret set CODEX_AUTH_JSON --repo $REPO < ~/.codex/auth.json"$'\n'
            body+='```'$'\n\n'
          fi

          body+="This issue will auto-close the next time both jobs succeed."

          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$REPO" --body "$body"
          else
            gh issue create --repo "$REPO" --title "$title" --body "$body"
          fi

      - name: Close resolved failure issue
        if: env.CLAUDE_FAILED == 'false' && env.CODEX_FAILED == 'false'
        run: |
          title="Warm-up needs attention"
          existing=$(gh issue list --repo "$REPO" --state open --json number,title \
            --jq '[.[] | select(.title=="'"$title"'")][0].number // empty')
          if [ -n "$existing" ]; then
            gh issue close "$existing" --repo "$REPO" \
              --comment "Resolved - a subsequent run succeeded. Closing automatically."
          fi

  # --------------------------------------------------------------------------
  # Heartbeat — keeps the repo "active" so GitHub never auto-disables the
  # schedule after 60 idle days, even if both warm jobs are failing.
  # Committing on every trigger would be 48 commits/day of noise, so it
  # commits at most once per calendar day.
  # --------------------------------------------------------------------------
  heartbeat:
    needs: [warm-claude, warm-codex]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Commit timestamp (once per day)
        run: |
          today=$(date -u +%F)
          if [ "$(cut -c1-10 heartbeat.txt 2>/dev/null)" = "$today" ]; then
            echo "Heartbeat already committed today ($today) - skipping."
            exit 0
          fi
          date -u +"%Y-%m-%dT%H:%M:%SZ" > heartbeat.txt
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add heartbeat.txt
          git commit -m "chore: heartbeat $(cat heartbeat.txt)" || exit 0
          for i in 1 2 3; do
            git pull --rebase --autostash && git push && break
            sleep $((RANDOM % 5 + 1))
          done
